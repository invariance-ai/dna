name: "dna pulse"
description: "Run dna pulse on the PR diff and post the risk report as a sticky comment"
author: "Invariance"
inputs:
  base:
    description: "Diff base ref"
    required: false
    default: ${{ github.event.pull_request.base.sha }}
  comment:
    description: "Post the report as a PR comment"
    required: false
    default: "true"
  fail-on-block:
    description: "Exit non-zero (fail the check) when risk_band == block"
    required: false
    default: "true"
  dna-version:
    description: "Version of @invariance/dna to install (npm dist-tag or version)"
    required: false
    default: "latest"
runs:
  using: "composite"
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dna
      shell: bash
      run: |
        npm i -g @invariance/dna@${{ inputs.dna-version }}
        dna --version || true

    - name: Index repo
      shell: bash
      run: dna index || true

    - name: Run pulse
      id: pulse
      shell: bash
      env:
        BASE: ${{ inputs.base }}
      run: |
        set +e
        dna pulse --base "$BASE" --json > pulse.json
        echo "exit=$?" >> "$GITHUB_OUTPUT"
        dna pulse --base "$BASE" --github > pulse.md
        BAND=$(node -e "console.log(require('./pulse.json').risk_band)")
        SCORE=$(node -e "console.log(require('./pulse.json').risk_score)")
        echo "band=$BAND" >> "$GITHUB_OUTPUT"
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"

    - name: Comment on PR
      if: ${{ inputs.comment == 'true' && github.event.pull_request }}
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: dna-pulse
        path: pulse.md

    - name: Fail on block
      if: ${{ inputs.fail-on-block == 'true' && steps.pulse.outputs.band == 'block' }}
      shell: bash
      run: |
        echo "dna pulse risk_band=block (score=${{ steps.pulse.outputs.score }})"
        exit 1
