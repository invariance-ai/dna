name: dna pulse
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/dna-pulse
        with:
          base: ${{ github.event.pull_request.base.sha }}
          fail-on-block: "true"
