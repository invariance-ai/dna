name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      # Version is read from the root package.json `packageManager` field.
      # Passing an explicit `version:` here conflicts with it (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first: workspace packages (dna-llm, dna-cli, …) import sibling
      # packages by their published entrypoints, so the .d.ts files must exist
      # before `tsc --noEmit` can resolve `@invariance/dna-schemas` etc.
      - run: pnpm -r build

      - run: pnpm -r typecheck

      - run: pnpm -r test

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      # Version is read from the root package.json `packageManager` field.
      # Passing an explicit `version:` here conflicts with it (ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

      - name: Smoke — init, index, doctor on a fresh repo
        run: |
          set -euo pipefail
          tmp=$(mktemp -d)
          cd "$tmp"
          git init -q
          echo "export function hello() { return 'hi'; }" > hello.ts
          git add . && git -c user.email=ci@x -c user.name=ci commit -q -m init
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" init
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" index
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" doctor
          node "$GITHUB_WORKSPACE/packages/cli/dist/index.js" find hello
